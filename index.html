<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel TOPT de 24 Horas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --accent: #2980b9;
            --border: #dcdde1;
            --success: #2ecc71;
            --error: #e74c3c;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .main-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: none;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 24px; }
        
        .token-display {
            background: #f8f9fa;
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        .token-blocks {
            display: inline-block;
            font-size: 48px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 4px;
        }
        .token-separator {
            margin: 0 10px;
            color: #bdc3c7;
            font-size: 42px;
            user-select: none;
        }
        .time-left { font-size: 13px; color: #7f8c8d; margin-top: 14px; }

        .result-box {
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            margin-top: 20px;
        }
        .result-box.valid { display: block; background-color: #e8f8f0; color: var(--success); border: 1px solid var(--success); }
        .result-box.invalid { display: block; background-color: #fdedec; color: var(--error); border: 1px solid var(--error); }
    </style>

    <script src="https://unpkg.com/@otplib/preset-browser@12.0.1/buffer.js"></script>
    <script src="https://unpkg.com/@otplib/preset-browser@12.0.1/index.js"></script>
</head>
<body>

    <div class="container my-5">
        <div class="card main-card p-4 p-md-5">
            <div class="row g-5">
                
                <div class="col-12 col-md-6 col-divider">
                    <h1 class="text-center text-md-start">Generador TOPT (24h)</h1>
                    <p class="subtitle text-center text-md-start">Clave secreta en texto plano (ASCII)</p>

                    <div class="mb-4">
                        <label for="secretInput" class="form-label fw-semibold">Clave Secreta</label>
                        <input type="text" id="secretInput" class="form-control" placeholder="Ej: mi-clave-secreta-123">
                    </div>

                    <div class="token-display text-center">
                        <div class="token-label">CÓDIGO DEL DÍA</div>
                        <div class="d-flex justify-content-center align-items-center">
                            <span id="block1" class="token-blocks">---</span>
                            <span id="separator" class="token-separator">-</span>
                            <span id="block2" class="token-blocks">---</span>
                        </div>
                        <div id="timeLeft" class="time-left">Calculando...</div>
                    </div>
                </div>

                <div class="col-12 col-md-6">
                    <h1 class="text-center text-md-start">Validador TOPT (24h)</h1>
                    <p class="subtitle text-center text-md-start">Comprueba si un código es correcto hoy</p>

                    <div class="mb-3">
                        <label for="valSecretInput" class="form-label fw-semibold">Clave Secreta</label>
                        <input type="text" id="valSecretInput" class="form-control" placeholder="Ej: mi-clave-secreta-123">
                    </div>

                    <div class="mb-4">
                        <label for="valCodeInput" class="form-label fw-semibold">Código de 6 dígitos</label>
                        <input type="text" id="valCodeInput" class="form-control text-center fs-4 fw-bold text-secondary" placeholder="000000" maxlength="6">
                    </div>

                    <div id="resultBox" class="result-box text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Esperar a que otplib esté disponible
    function waitForOtplib() {
        return new Promise(resolve => {
            if (window.otplib) return resolve();
            const check = setInterval(() => {
                if (window.otplib) {
                    clearInterval(check);
                    resolve();
                }
            }, 50);
        });
    }

    const secretInput = document.getElementById('secretInput');
    const block1 = document.getElementById('block1');
    const block2 = document.getElementById('block2');
    const separator = document.getElementById('separator');
    const timeLeftDisplay = document.getElementById('timeLeft');

    const valSecretInput = document.getElementById('valSecretInput');
    const valCodeInput = document.getElementById('valCodeInput');
    const resultBox = document.getElementById('resultBox');

    let lastDayCounter = null;

    function bufferToBase32(buffer) {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        const bytes = new Uint8Array(buffer);
        let bits = 0, value = 0, output = "";

        for (let i = 0; i < bytes.length; i++) {
            value = (value << 8) | bytes[i];
            bits += 8;
            while (bits >= 5) {
                output += alphabet[(value >>> (bits - 5)) & 31];
                bits -= 5;
            }
        }
        if (bits > 0) output += alphabet[(value << (5 - bits)) & 31];
        return output;
    }

    async function getDayContext(secretText) {
        const encoder = new TextEncoder();
        const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(secretText));
        const secretBase32 = bufferToBase32(hashBuffer);

        // Usamos UTC para consistencia global
        const now = new Date();
        const utcDay = Math.floor(now.getTime() / 86400000);

        return { secretBase32, dayCounter: utcDay, now };
    }

    async function updateTOTP() {
        const secret = secretInput.value.trim();
        localStorage.setItem('totp_ascii_secret', secret);

        if (!secret) {
            block1.textContent = "---";
            block2.textContent = "---";
            timeLeftDisplay.textContent = "Introduce una clave secreta";
            resultBox.style.display = "none";
            return;
        }

        try {
            const { secretBase32, dayCounter, now } = await getDayContext(secret);

            await waitForOtplib();
            otplib.hotp.options = { digits: 6 };
            const token = otplib.hotp.generate(secretBase32, dayCounter);

            block1.textContent = token.substring(0, 3);
            block2.textContent = token.substring(3, 6);
            separator.style.display = "inline";

            // Tiempo restante hasta próximo día (UTC)
            const nextDay = (Math.floor(now.getTime() / 86400000) + 1) * 86400000;
            const diffMs = nextDay - now.getTime();

            const hours = Math.floor(diffMs / 3600000);
            const minutes = Math.floor((diffMs % 3600000) / 60000);
            const seconds = Math.floor((diffMs % 60000) / 1000);

            timeLeftDisplay.textContent = `Próximo código en: ${hours}h ${minutes}m ${seconds}s`;

            lastDayCounter = dayCounter;
            validateOTP(); // Actualizar validador

        } catch (e) {
            console.error(e);
            block1.textContent = "ERR";
            block2.textContent = "OR";
            timeLeftDisplay.textContent = "Error al generar código";
        }
    }

    async function validateOTP() {
        const secret = valSecretInput.value.trim();
        const inputCode = valCodeInput.value.trim().replace(/[^0-9]/g, '');

        if (!secret || inputCode.length !== 6) {
            resultBox.style.display = "none";
            return;
        }

        try {
            const { secretBase32, dayCounter } = await getDayContext(secret);
            await waitForOtplib();
            
            otplib.hotp.options = { digits: 6 };
            const validToken = otplib.hotp.generate(secretBase32, dayCounter);

            if (inputCode === validToken) {
                resultBox.className = "result-box valid text-center";
                resultBox.innerHTML = "✓ Código <strong>VÁLIDO</strong> para hoy";
            } else {
                resultBox.className = "result-box invalid text-center";
                resultBox.innerHTML = "✗ Código incorrecto o caducado";
            }
            resultBox.style.display = "block";
        } catch (e) {
            console.error(e);
            resultBox.className = "result-box invalid text-center";
            resultBox.textContent = "Error al validar";
            resultBox.style.display = "block";
        }
    }

    // Eventos
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('totp_ascii_secret') || "mi-clave-secreta-123";
        secretInput.value = saved;
        valSecretInput.value = saved;
        updateTOTP();
    });

    secretInput.addEventListener('input', () => {
        valSecretInput.value = secretInput.value;
        updateTOTP();
    });

    valSecretInput.addEventListener('input', () => {
        secretInput.value = valSecretInput.value;
        updateTOTP();
    });

    valCodeInput.addEventListener('input', validateOTP);

    // Actualización cada segundo
    setInterval(updateTOTP, 1000);
    </script>
</body>
</html>
